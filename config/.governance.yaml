# Pilot project — sandbox 環境設定

version: 1

logical_project: pilot

environments:
  test:
    project_id: praxis-works-367201        # 你的 sandbox test
  prod:
    project_id: tapirus-test-384312        # 你的 sandbox prod

exclude:
  datasets:
    - staging_temp
    - _dataform_staging
    - _script_scratch
    - Custom_Tapirus
    - governance_audit
  routines: []
    # 範例（待基線匯入後盤點補上）：
    # - pattern: "*.sp_migrate_sqlserver_*"
    #   reason: "SQL Server 遷移歷史搬移工具"
    #   review_by: "2026-09-30"
    #   owner: "lin"

drift_check:
  schedule: "0 3 * * *"
  scope:
    - routines
  notify: telegram
  ignore_known: true

cost_gate:
  pr_validate_max_bytes: 100000000000      # 100 GB

platform:
  ref: v1.1
  repo: kunfonglin/sql-governance-platform
