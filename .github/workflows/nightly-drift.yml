name: nightly-drift

on:
  schedule:
    - cron: '0 3 * * *'        # 每日 03:00 UTC
  workflow_dispatch:           # 也可手動觸發

jobs:
  drift:
    uses: kunfonglin/sql-governance-platform/.github/workflows/reusable-nightly-drift.yml@v1.0
    with:
      project_id: ${{ vars.PROJECT_PROD }}
      region: ${{ vars.REGION }}
      logical_project: pilot
      platform_repo: kunfonglin/sql-governance-platform
      platform_ref: v1.0
    secrets:
      WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
      DEPLOY_SA: ${{ secrets.DEPLOY_SA }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
